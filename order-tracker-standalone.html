const FOOD_STATUS_ORDER = ['pending', 'cooking', 'ready', 'collected'];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getTheme(dark) {
  return dark ? {
    INK: '#F3EDE6', SUB: '#A99D8E', BORDER: '#3A342C', BG: '#171310', SURFACE: '#221C17',
    ACCENT: '#E5544A', OVERLAY: 'rgba(0,0,0,0.65)',
    fs: {
      pending: { label: 'Pending', color: '#E8C468', bg: '#3A2E10', bar: '#E8C468', next: 'Start Cooking' },
      cooking: { label: 'Cooking', color: '#E5544A', bg: '#3A1712', bar: '#E5544A', next: 'Mark Ready' },
      ready: { label: 'Ready', color: '#7FBF8F', bg: '#16281B', bar: '#7FBF8F', next: 'Mark Picked Up' },
      collected: { label: 'Picked Up', color: '#A99D8E', bg: '#221C17', bar: '#5C5347', next: null },
    },
    paidPill: { color: '#7FBF8F', bg: '#16281B' },
    unpaidPill: { color: '#E38B7A', bg: '#3A1712' },
    completedBg: '#16281B', completedBorder: '#254D30',
  } : {
    INK: '#211A14', SUB: '#8A7968', BORDER: '#E8DFD2', BG: '#FBF7F1', SURFACE: '#FFFFFF',
    ACCENT: '#C0392B', OVERLAY: 'rgba(33,26,20,0.5)',
    fs: {
      pending: { label: 'Pending', color: '#946A0C', bg: '#FBF0D6', bar: '#D4A017', next: 'Start Cooking' },
      cooking: { label: 'Cooking', color: '#A82B20', bg: '#FBE3DF', bar: '#C0392B', next: 'Mark Ready' },
      ready: { label: 'Ready', color: '#39623F', bg: '#E4EFE2', bar: '#5E9268', next: 'Mark Picked Up' },
      collected: { label: 'Picked Up', color: '#8A7968', bg: '#F2ECE2', bar: '#B5A78F', next: null },
    },
    paidPill: { color: '#39623F', bg: '#E4EFE2' },
    unpaidPill: { color: '#A82B20', bg: '#FBE3DF' },
    completedBg: '#F2F7EE', completedBorder: '#D3E4CC',

}

function StatCard({ icon: Icon, label, value, tone, T }) {
  return (
    <div style={{ flex: 1, background: T.SURFACE, borderRadius: 12, padding: '14px 12px', border: `1px solid ${T.BORDER}`, display: 'flex', flexDirection: 'column', gap: 6 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: tone || T.SUB }}>
        <Icon size={14} />
        <span style={{ fontSize: 11.5, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{label}</span>
      </div>
      <div style={{ fontSize: 20, fontWeight: 700, color: T.INK }}>{value}</div>

}

function Pill({ label, color, bg }) {
  return <span style={{ fontSize: 11.5, fontWeight: 600, padding: '3px 9px', borderRadius: 6, background: bg, color }}>{label}</span>;
}

function SwipeableCard({ children, onDelete, T }) {
  const [dragX, setDragX] = useState(0);
  const startX = useRef(0);
  const dragging = useRef(false);
  const REVEAL = -76;

  function onTouchStart(e) {
    startX.current = e.touches[0].clientX;
    dragging.current = true;
  }
  function onTouchMove(e) {
    if (!dragging.current) return;
    const delta = e.touches[0].clientX - startX.current;
    const next = Math.min(0, Math.max(REVEAL, dragX === REVEAL ? REVEAL + delta : delta));
    setDragX(next);
  }
  function onTouchEnd() {
    dragging.current = false;
    setDragX(prev => (prev < REVEAL / 2 ? REVEAL : 0));
  }

  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderRadius: 12 }}>
      <div style={{
        position: 'absolute', inset: 0, background: '#DC2626', display: 'flex',
        alignItems: 'center', justifyContent: 'flex-end', paddingRight: 20
      }}>
        <button onClick={() => { onDelete(); setDragX(0); }} aria-label="Delete Order" style={{ background: 'none', border: 'none', color: '#fff', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, cursor: 'pointer' }}>
          <Trash2 size={18} />
          <span style={{ fontSize: 10, fontWeight: 600 }}>Delete</span>
        </button>
      </div>
      <div
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{ transform: `translateX(${dragX}px)`, transition: dragging.current ? 'none' : 'transform 0.2s ease', position: 'relative', width: '100%', opacity: 1 }}
      >
        {children}
      </div>
    </div>
  );
}

export default function OrderTracker() {
  const [orders, setOrders] = useState([]);
  const [stock, setStock] = useState({ poutine: 5, meatball: 60 });
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [showStock, setShowStock] = useState(false);
  const [stockEdits, setStockEdits] = useState({});
  const [name, setName] = useState('');
  const [cart, setCart] = useState({});
  const [paidUpfront, setPaidUpfront] = useState(false);
  const [error, setError] = useState('');
  const [darkMode, setDarkMode] = useState(false);
  const [unpaidOnly, setUnpaidOnly] = useState(false);
  const [search, setSearch] = useState('');
  const [warningMsg, setWarningMsg] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [pullDistance, setPullDistance] = useState(0);
  const pullStartY = useRef(0);
  const pulling = useRef(false);

  const T = getTheme(darkMode);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get('orders', false);
        if (res && res.value) setOrders(JSON.parse(res.value));
      } catch (e) {}
      try {
        const t = await storage.get('darkMode', false);
        if (t && t.value) setDarkMode(t.value === 'true');
      } catch (e) {}
      try {
        const s = await storage.get('stock', false);
        if (s && s.value) setStock(JSON.parse(s.value));
      } catch (e) {}
      setLoading(false);
    })();
  }, []);

  async function persist(next) {
    setOrders(next);
    try { await storage.set('orders', JSON.stringify(next), false); } catch (e) { console.error(e); }
  }

  async function persistStock(next) {
    setStock(next);
    try { await storage.set('stock', JSON.stringify(next), false); } catch (e) { console.error(e); }
  }

  async function toggleDark() {
    const next = !darkMode;
    setDarkMode(next);
    try { await storage.set('darkMode', String(next), false); } catch (e) {}
  }

  function resetForm() {
    setName(''); setCart({}); setPaidUpfront(false); setError('');
  }

  function maxOrderable(menuId) {
    const m = MENU.find(x => x.id === menuId);
    if (!m || !m.usagePerOrder) return Infinity;
    const available = stock[menuId] ?? 0;
    return Math.max(0, Math.floor(available / m.usagePerOrder));
  }

  function changeQty(menuId, delta) {
    const m = MENU.find(x => x.id === menuId);
    if (delta > 0) {
      const current = cart[menuId] || 0;
      const max = maxOrderable(menuId);
      if (max <= 0) {
        setWarningMsg(`${m.name} is sold out. Please restock before adding more orders.`);
        return;
      }
      if (current + delta > max) {
        setWarningMsg(`Only ${max} × ${m.name} left in stock.`);
        return;
      }
    }
    setCart(prev => {
      const next = { ...prev };
      const current = next[menuId] || 0;
      const updated = Math.max(0, current + delta);
      if (updated === 0) delete next[menuId]; else next[menuId] = updated;
      return next;
    });
  }

  const cartItems = Object.entries(cart).map(([menuId, qty]) => ({ ...MENU.find(m => m.id === menuId), qty }));
  const cartTotal = cartItems.reduce((sum, it) => sum + it.price * it.qty, 0);

  function addOrder() {
    if (!name.trim() || cartItems.length === 0) {
      setError('Add a customer name and at least one item.');
      return;
    }
    for (const it of cartItems) {
      if (it.qty > maxOrderable(it.id)) {
        setWarningMsg(`${it.name} is sold out or doesn't have enough stock for this order.`);
        return;
      }
    }
    const nextNumber = (orders.reduce((max, o) => Math.max(max, o.orderNumber || 0), 0) || 0) + 1;
    const newOrder = {
      id: uid(),
      orderNumber: nextNumber,
      name: name.trim(),
      items: cartItems.map(({ name, price, qty }) => ({ name, price, qty })),
      total: cartTotal,
      foodStatus: 'pending',
      paid: paidUpfront,
      createdAt: Date.now(),
      paidAt: paidUpfront ? Date.now() : null,
    };
    persist([newOrder, ...orders]);

    const nextStock = { ...stock };
    cartItems.forEach(it => {
      const menuItem = MENU.find(m => m.id === it.id);
      if (menuItem) nextStock[it.id] = (nextStock[it.id] || 0) - menuItem.usagePerOrder * it.qty;
    });
    persistStock(nextStock);

    resetForm();
    setShowForm(false);
  }

  function repeatOrder(order) {
    setName(order.name);
    const nextCart = {};
    order.items.forEach(it => {
      const menuItem = MENU.find(m => m.name === it.name);
      if (menuItem) nextCart[menuItem.id] = (nextCart[menuItem.id] || 0) + it.qty;
    });
    setCart(nextCart);
    setPaidUpfront(false);
    setShowForm(true);
  }

  function advanceFoodStatus(order) {
    const idx = FOOD_STATUS_ORDER.indexOf(order.foodStatus);
    const nextStatus = FOOD_STATUS_ORDER[Math.min(idx + 1, FOOD_STATUS_ORDER.length - 1)];
    persist(orders.map(o => o.id === order.id ? { ...o, foodStatus: nextStatus } : o));
  }

  function togglePaid(order) {
    persist(orders.map(o => o.id === order.id ? { ...o, paid: !o.paid, paidAt: !o.paid ? Date.now() : null } : o));
  }

  function removeOrder(id) {
    persist(orders.filter(o => o.id !== id));
  }

  async function refreshOrders() {
    setRefreshing(true);
    try {
      const res = await storage.get('orders', false);
      if (res && res.value) setOrders(JSON.parse(res.value));
    } catch (e) {}
    try {
      const s = await storage.get('stock', false);
      if (s && s.value) setStock(JSON.parse(s.value));
    } catch (e) {}
    setTimeout(() => setRefreshing(false), 500);
  }

  const PULL_THRESHOLD = 70;
  function onListTouchStart(e) {
    if (window.scrollY <= 0) {
      pullStartY.current = e.touches[0].clientY;
      pulling.current = true;
    }
  }
  function onListTouchMove(e) {
    if (!pulling.current) return;
    const delta = e.touches[0].clientY - pullStartY.current;
    if (delta > 0 && window.scrollY <= 0) {
      setPullDistance(Math.min(100, delta * 0.5));
    } else {
      pulling.current = false;
      setPullDistance(0);
    }
  }
  function onListTouchEnd() {
    if (pulling.current && pullDistance > PULL_THRESHOLD) {
      refreshOrders();
    }
    pulling.current = false;
    setPullDistance(0);
  }

  function openStockEditor() {
    const edits = {};
    MENU.forEach(m => { edits[m.id] = String(stock[m.id] ?? 0); });
    setStockEdits(edits);
    setShowStock(true);
  }

  function saveStock() {
    const next = { ...stock };
    MENU.forEach(m => {
      const val = parseFloat(stockEdits[m.id]);
      next[m.id] = isNaN(val) ? (stock[m.id] || 0) : val;
    });
    persistStock(next);
    setShowStock(false);
  }

  let openOrders = orders.filter(o => !(o.foodStatus === 'collected' && o.paid));
  if (unpaidOnly) openOrders = openOrders.filter(o => !o.paid);
  let closedOrders = orders.filter(o => o.foodStatus === 'collected' && o.paid);
  if (search.trim()) {
    const q = search.trim().toLowerCase();
    openOrders = openOrders.filter(o => o.name.toLowerCase().includes(q));
    closedOrders = closedOrders.filter(o => o.name.toLowerCase().includes(q));
  }
  const todayTotal = orders.filter(o => o.paid && o.paidAt && new Date(o.paidAt).toDateString() === new Date().toDateString()).reduce((sum, o) => sum + o.total, 0);
  const unpaidCount = orders.filter(o => !o.paid).length;
  const lowStockItems = MENU.filter(m => (stock[m.id] ?? 0) < m.lowThreshold);

  function itemsSummary(items) { return items.map(it => `${it.qty}× ${it.name}`).join(', '); }
  function exportCSV() {
    const headers = ['Order Number', 'Customer', 'Items', 'Total', 'Food Status', 'Paid', 'Created At', 'Paid At'];
    const rows = orders.map(o => [
      orderTag(o.orderNumber),
      o.name,
      itemsSummary(o.items),
      o.total.toFixed(2),
      o.foodStatus,
      o.paid ? 'Yes' : 'No',
      new Date(o.createdAt).toLocaleString(),
      o.paidAt ? new Date(o.paidAt).toLocaleString() : '',
    ]);
    const escapeCell = (val) => {
      const s = String(val ?? '');
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const csv = [headers, ...rows].map(r => r.map(escapeCell).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `orders-${dateStr}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function orderTag(n) { return `#${String(n).padStart(3, '0')}`; }
  function formatHeaderDate() {
    const d = new Date();
    const weekday = d.toLocaleDateString('en-GB', { weekday: 'short' });
    const day = d.getDate();
    const month = d.toLocaleDateString('en-GB', { month: 'short' });
    const year = d.getFullYear();
    return `${weekday}, ${day} ${month} ${year}`;
  }
  function timeAgo(ts) {
    const mins = Math.floor((Date.now() - ts) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins} min${mins === 1 ? '' : 's'} ago`;
    const hrs = Math.floor(mins / 60);
    return `${hrs} hr${hrs === 1 ? '' : 's'} ago`;
  }

  if (loading) {
    return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.BG }}><p style={{ color: T.SUB, fontSize: 14 }}>Loading Orders…</p></div>;
  }

  return (
    <div
      onTouchStart={onListTouchStart}
      onTouchMove={onListTouchMove}
      onTouchEnd={onListTouchEnd}
      style={{ minHeight: '100vh', background: T.BG, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif", paddingBottom: 100, transition: 'background 0.2s ease' }}
    >
      <style>{`
        * { box-sizing: border-box; }
        input:focus, button:focus-visible { outline: 2px solid ${T.ACCENT}; outline-offset: 1px; }
        button { font-family: inherit; }
        input::placeholder { color: ${T.SUB}; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .content-col { max-width: 100%; margin: 0 auto; width: 100%; }
        .sheet-overlay { align-items: flex-end; }
        .sheet-panel { max-width: 100%; border-radius: 16px 16px 0 0; }
        @media (min-width: 720px) {
          .content-col { max-width: 640px; }
          .sheet-overlay { align-items: center; }
          .sheet-panel { max-width: 460px; border-radius: 16px; max-height: 82vh !important; }
        }
      `}</style>

      {(pullDistance > 0 || refreshing) && (
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: refreshing ? 44 : Math.min(60, pullDistance), overflow: 'hidden', transition: refreshing ? 'height 0.2s ease' : 'none' }}>
          <RefreshCw size={18} color={T.ACCENT} style={{ animation: refreshing ? 'spin 0.7s linear infinite' : 'none', opacity: refreshing ? 1 : Math.min(1, pullDistance / PULL_THRESHOLD) }} />
        </div>
      )}

      {/* Header */}
      <div style={{ background: T.SURFACE, borderBottom: `1px solid ${T.BORDER}`, padding: '20px 16px 16px' }}>
        <div className="content-col">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14, gap: 10 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: T.INK, letterSpacing: '-0.01em' }}>Order Tracker</h1>
            <p style={{ margin: '2px 0 0', fontSize: 13, color: T.SUB }}>
              {formatHeaderDate()}
            </p>
          </div>
          <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
            <button onClick={exportCSV} aria-label="Export CSV" style={{ background: T.BG, border: `1px solid ${T.BORDER}`, color: T.INK, borderRadius: 8, width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0 }}>
              <Download size={16} />
            </button>
            <button onClick={openStockEditor} aria-label="Stock" style={{ position: 'relative', background: T.BG, border: `1px solid ${T.BORDER}`, color: T.INK, borderRadius: 8, width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0 }}>
              <ClipboardList size={16} />
              {lowStockItems.length > 0 && (
                <span style={{ position: 'absolute', top: -3, right: -3, width: 9, height: 9, borderRadius: '50%', background: '#EF4444', border: `2px solid ${T.SURFACE}` }} />
              )}
            </button>
            <button onClick={toggleDark} aria-label="Toggle Dark Mode" style={{ background: T.BG, border: `1px solid ${T.BORDER}`, color: T.INK, borderRadius: 8, width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0 }}>
              {darkMode ? <Sun size={16} /> : <Moon size={16} />}
            </button>
          </div>
        </div>

        <button onClick={() => setShowForm(true)} style={{ width: '100%', background: T.ACCENT, color: '#fff', border: 'none', borderRadius: 8, padding: '11px 14px', fontSize: 14.5, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, whiteSpace: 'nowrap', marginBottom: 16 }}>
          <Plus size={17} /> New Order
        </button>

        <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
          <StatCard icon={TrendingUp} label="Today" value={`$${todayTotal.toFixed(2)}`} tone="#10B981" T={T} />
          <StatCard icon={Package} label="Open" value={openOrders.length} tone={T.ACCENT} T={T} />
          <StatCard icon={AlertCircle} label="Unpaid" value={unpaidCount} tone={unpaidCount > 0 ? '#EF4444' : T.SUB} T={T} />
        </div>

        {lowStockItems.length > 0 && (
          <div style={{
            display: 'flex', alignItems: 'center', gap: 8, background: darkMode ? '#3F0A0A' : '#FEF2F2',
            border: `1px solid ${darkMode ? '#7F1D1D' : '#FECACA'}`, borderRadius: 10, padding: '8px 12px', marginBottom: 12
          }}>
            <AlertTriangle size={14} color="#EF4444" />
            <span style={{ fontSize: 12.5, fontWeight: 600, color: darkMode ? '#FCA5A5' : '#B91C1C' }}>
              Low Stock: {lowStockItems.map(m => m.name).join(', ')}
            </span>
          </div>
        )}

        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button
            onClick={() => setUnpaidOnly(v => !v)}
            style={{
              display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 12px', borderRadius: 999,
              border: `1px solid ${unpaidOnly ? T.ACCENT : T.BORDER}`, background: unpaidOnly ? (darkMode ? '#1E3A5F' : '#EFF6FF') : T.SURFACE,
              color: unpaidOnly ? T.ACCENT : T.SUB, fontSize: 12.5, fontWeight: 600, cursor: 'pointer', flexShrink: 0
            }}
          >
            <Filter size={13} /> Unpaid Only
          </button>
          <div style={{ position: 'relative', flex: 1 }}>
            <Search size={14} style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: T.SUB }} />
            <input
              placeholder="Search Customer Name"
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{
                width: '100%', padding: '7px 10px 7px 30px', borderRadius: 999,
                border: `1px solid ${T.BORDER}`, background: T.SURFACE, color: T.INK, fontSize: 12.5
              }}
            />
          </div>
        </div>
        </div>
      </div>

      {/* Order list */}
      <div style={{ padding: '16px' }}>
        <div className="content-col" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {openOrders.length === 0 && closedOrders.length === 0 && (
          <div style={{ textAlign: 'center', padding: '56px 20px', color: T.SUB }}>
            <p style={{ margin: 0, fontSize: 14.5, fontWeight: 600, color: T.INK }}>No Orders Yet</p>
            <p style={{ margin: '4px 0 0', fontSize: 13 }}>Tap "New Order" To Get Started</p>
          </div>
        )}

        {openOrders.length === 0 && unpaidOnly && closedOrders.length > 0 && (
          <div style={{ textAlign: 'center', padding: '24px 20px', color: T.SUB, fontSize: 13.5 }}>All Caught Up — No Unpaid Orders.</div>
        )}

        {openOrders.length > 0 && (
          <div style={{ fontSize: 12, fontWeight: 700, color: T.SUB, textTransform: 'uppercase', letterSpacing: '0.05em', margin: '4px 0 2px' }}>
            Active ({openOrders.length})
          </div>
        )}

        {openOrders.map(order => {
          const fs = T.fs[order.foodStatus];
          return (
            <SwipeableCard key={order.id} onDelete={() => removeOrder(order.id)} T={T}>
              <div style={{ background: T.SURFACE, borderRadius: 12, padding: '14px 16px 14px 13px', border: `1px solid ${T.BORDER}`, borderLeft: `4px solid ${fs.bar}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: T.SUB }}>{orderTag(order.orderNumber)}</span>
                      <span style={{ fontWeight: 700, fontSize: 15, color: T.INK }}>{order.name}</span>
                      <span style={{ fontSize: 12, color: T.SUB }}>{timeAgo(order.createdAt)}</span>
                    </div>
                    <div style={{ fontSize: 13.5, color: T.SUB, marginTop: 2 }}>{itemsSummary(order.items)}</div>
                  </div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: T.INK }}>${order.total.toFixed(2)}</div>
                </div>

                <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>
                  <Pill label={fs.label} color={fs.color} bg={fs.bg} />
                  <Pill label={order.paid ? 'Paid' : 'Unpaid'} color={order.paid ? T.paidPill.color : T.unpaidPill.color} bg={order.paid ? T.paidPill.bg : T.unpaidPill.bg} />
                </div>

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 12, gap: 8 }}>
                  <button onClick={() => removeOrder(order.id)} aria-label="Delete Order" style={{ border: `1px solid ${T.BORDER}`, background: T.SURFACE, color: T.SUB, borderRadius: 8, width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0 }}>
                    <Trash2 size={14} />
                  </button>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
                    <button onClick={() => repeatOrder(order)} aria-label="Repeat Order" style={{ border: `1px solid ${T.BORDER}`, background: T.SURFACE, color: T.SUB, borderRadius: 8, width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                      <Repeat size={14} />
                    </button>
                    <button onClick={() => togglePaid(order)} style={{
                      border: `1px solid ${order.paid ? T.BORDER : '#FCA5A5'}`, borderRadius: 8,
                      background: order.paid ? T.SURFACE : (darkMode ? '#3F0A0A' : '#FEF2F2'), color: order.paid ? T.SUB : '#EF4444',
                      padding: '7px 12px', fontSize: 12.5, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5
                    }}>
                      <CircleDollarSign size={13} /> {order.paid ? 'Unmark Paid' : 'Mark Paid'}
                    </button>
                    {fs.next && (
                      <button onClick={() => advanceFoodStatus(order)} style={{ border: 'none', borderRadius: 8, background: T.ACCENT, color: '#fff', padding: '7px 13px', fontSize: 12.5, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5 }}>
                        {order.foodStatus === 'ready' ? <Check size={13} /> : <Clock size={13} />} {fs.next}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </SwipeableCard>
          );
        })}

        {closedOrders.length > 0 && !unpaidOnly && (
          <>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.SUB, textTransform: 'uppercase', letterSpacing: '0.05em', marginTop: 16, marginBottom: 2 }}>
              Completed ({closedOrders.length})
            </div>
            {closedOrders.map(order => (
              <SwipeableCard key={order.id} onDelete={() => removeOrder(order.id)} T={T}>
                <div style={{
                  background: T.completedBg, borderRadius: 12, padding: '12px 16px',
                  border: `1px solid ${T.completedBorder}`, borderLeft: `4px solid #10B981`,
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                }}>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      <Check size={13} color="#10B981" />
                      <span style={{ fontSize: 11.5, fontWeight: 700, color: T.SUB }}>{orderTag(order.orderNumber)}</span>
                      <span style={{ fontWeight: 700, fontSize: 14, color: T.INK }}>{order.name}</span>
                    </div>
                    <div style={{ fontSize: 12.5, color: T.SUB, marginTop: 1 }}>{itemsSummary(order.items)}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, color: T.INK }}>${order.total.toFixed(2)}</div>
                    <button onClick={() => removeOrder(order.id)} aria-label="Delete Order" style={{ border: 'none', background: 'none', color: T.SUB, padding: 4, cursor: 'pointer', display: 'flex' }}>
                      <Trash2 size={14} />
                    </button>
                  </div>
                </div>
              </SwipeableCard>
            ))}
          </>
        )}
        </div>
      </div>

      {/* Stock modal */}
      {showStock && (
        <div className="sheet-overlay" style={{ position: 'fixed', inset: 0, background: T.OVERLAY, display: 'flex', zIndex: 10 }} onClick={() => setShowStock(false)}>
          <div className="sheet-panel" onClick={e => e.stopPropagation()} style={{ background: T.SURFACE, width: '100%', maxHeight: '80vh', overflowY: 'auto', padding: '18px 18px 24px' }}>
            <div style={{ width: 36, height: 4, background: T.BORDER, borderRadius: 2, margin: '0 auto 16px' }} />
            <h2 style={{ margin: '0 0 16px', fontSize: 17, fontWeight: 700, color: T.INK }}>Stock Levels</h2>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 18 }}>
              {MENU.map(m => {
                const current = stock[m.id] ?? 0;
                const isLow = current < m.lowThreshold;
                return (
                  <div key={m.id} style={{ border: `1px solid ${isLow ? '#FCA5A5' : T.BORDER}`, borderRadius: 12, padding: '12px 14px', background: isLow ? (darkMode ? '#3F0A0A' : '#FEF2F2') : T.BG }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <img src={m.image} alt={m.name} style={{ width: 32, height: 32, objectFit: 'contain', borderRadius: 6, flexShrink: 0 }} />
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 14, color: T.INK }}>{m.name}</div>
                          <div style={{ fontSize: 11.5, color: T.SUB }}>Currently: {current.toFixed(m.stockUnit === 'kg' ? 2 : 0)} {m.stockUnit}</div>
                        </div>
                      </div>
                      {isLow && <AlertTriangle size={16} color="#EF4444" />}
                    </div>
                    <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                      <input
                        type="number"
                        step={m.stockUnit === 'kg' ? '0.1' : '1'}
                        value={stockEdits[m.id] ?? ''}
                        onChange={e => setStockEdits(prev => ({ ...prev, [m.id]: e.target.value }))}
                        style={{ flex: 1, padding: '9px 12px', borderRadius: 8, border: `1px solid ${T.BORDER}`, fontSize: 14, background: T.SURFACE, color: T.INK }}
                      />
                      <span style={{ fontSize: 13, color: T.SUB, fontWeight: 600 }}>{m.stockUnit}</span>
                    </div>
                    <div style={{ fontSize: 11, color: T.SUB, marginTop: 6 }}>
                      Low Stock Alert Below {m.lowThreshold} {m.stockUnit} · Uses {m.usagePerOrder} {m.stockUnit} Per Order
                    </div>
                  </div>
                );
              })}
            </div>

            <button onClick={saveStock} style={{ width: '100%', padding: '13px', borderRadius: 10, background: T.ACCENT, color: '#fff', border: 'none', fontWeight: 700, fontSize: 14.5, cursor: 'pointer' }}>
              Save Stock Levels
            </button>
            <button onClick={() => setShowStock(false)} style={{ width: '100%', marginTop: 8, padding: '10px', borderRadius: 10, background: 'none', color: T.SUB, border: 'none', fontWeight: 600, fontSize: 13.5, cursor: 'pointer' }}>
              Cancel
            </button>
          </div>
        </div>
      )}

      {/* Sold out / low stock warning popup */}
      {warningMsg && (
        <div style={{ position: 'fixed', inset: 0, background: T.OVERLAY, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 20, padding: 24 }} onClick={() => setWarningMsg(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background: T.SURFACE, borderRadius: 16, padding: '22px 20px', maxWidth: 340, width: '100%', textAlign: 'center' }}>
            <div style={{ width: 44, height: 44, borderRadius: '50%', background: darkMode ? '#3F0A0A' : '#FEF2F2', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
              <AlertTriangle size={22} color="#EF4444" />
            </div>
            <h3 style={{ margin: '0 0 6px', fontSize: 16, fontWeight: 700, color: T.INK }}>Out Of Stock</h3>
            <p style={{ margin: '0 0 18px', fontSize: 13.5, color: T.SUB, lineHeight: 1.4 }}>{warningMsg}</p>
            <button onClick={() => setWarningMsg(null)} style={{ width: '100%', padding: '11px', borderRadius: 10, background: T.ACCENT, color: '#fff', border: 'none', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
              Got It
            </button>
          </div>
        </div>
      )}

      {/* Form modal */}
      {showForm && (
        <div className="sheet-overlay" style={{ position: 'fixed', inset: 0, background: T.OVERLAY, display: 'flex', zIndex: 10 }} onClick={() => { setShowForm(false); resetForm(); }}>
          <div className="sheet-panel" onClick={e => e.stopPropagation()} style={{ background: T.SURFACE, width: '100%', maxHeight: '88vh', overflowY: 'auto', padding: '18px 18px 24px' }}>
            <div style={{ width: 36, height: 4, background: T.BORDER, borderRadius: 2, margin: '0 auto 16px' }} />
            <h2 style={{ margin: '0 0 16px', fontSize: 17, fontWeight: 700, color: T.INK }}>New Order</h2>

            <label style={{ fontSize: 12, fontWeight: 600, color: T.SUB, textTransform: 'uppercase', letterSpacing: '0.04em' }}>Customer Name</label>
            <input placeholder="" value={name} onChange={e => setName(e.target.value)}
              style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: `1px solid ${T.BORDER}`, fontSize: 14.5, marginTop: 6, marginBottom: 16, background: T.BG, color: T.INK }} />

            <div style={{ fontSize: 12, fontWeight: 600, color: T.SUB, textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 8 }}>
              Menu — Tap To Add
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
              {MENU.map(m => {
                const qty = cart[m.id] || 0;
                const current = stock[m.id] ?? 0;
                const isLow = current < m.lowThreshold;
                const max = maxOrderable(m.id);
                const isSoldOut = max <= 0;
                return (
                  <div key={m.id} style={{
                    display: 'flex', alignItems: 'center', gap: 12,
                    background: isSoldOut ? (darkMode ? '#1E1E1E' : '#F1F5F9') : qty > 0 ? (darkMode ? '#1E3A5F' : '#EFF6FF') : T.BG,
                    borderRadius: 10, padding: '10px 12px', border: `1px solid ${qty > 0 && !isSoldOut ? T.ACCENT : T.BORDER}`,
                    opacity: isSoldOut ? 0.6 : 1
                  }}>
                    <div style={{ position: 'relative', flexShrink: 0, width: 44, height: 44 }}>
                      <img src={m.image} alt={m.name} style={{ width: 44, height: 44, objectFit: 'contain', borderRadius: 8, filter: isSoldOut ? 'grayscale(1)' : 'none' }} />
                      {isLow && !isSoldOut && <span style={{ position: 'absolute', top: -2, right: -2, width: 10, height: 10, borderRadius: '50%', background: '#EF4444', border: `2px solid ${qty > 0 ? (darkMode ? '#1E3A5F' : '#EFF6FF') : T.BG}` }} />}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14.5, color: T.INK }}>{m.name}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: isSoldOut ? T.SUB : T.ACCENT, marginTop: 2 }}>${m.price.toFixed(2)}</div>
                      {isSoldOut ? (
                        <div style={{ fontSize: 11, fontWeight: 700, color: '#EF4444', marginTop: 2 }}>Sold Out</div>
                      ) : isLow ? (
                        <div style={{ fontSize: 11, fontWeight: 600, color: '#EF4444', marginTop: 2 }}>Low Stock: {current.toFixed(m.stockUnit === 'kg' ? 2 : 0)} {m.stockUnit} Left</div>
                      ) : null}
                    </div>
                    {qty === 0 ? (
                      <button onClick={() => changeQty(m.id, 1)} disabled={isSoldOut} style={{
                        border: 'none', borderRadius: 8, background: isSoldOut ? T.BORDER : T.ACCENT, color: isSoldOut ? T.SUB : '#fff',
                        width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center',
                        cursor: isSoldOut ? 'not-allowed' : 'pointer', flexShrink: 0
                      }}>
                        <Plus size={16} />
                      </button>
                    ) : (
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                        <button onClick={() => changeQty(m.id, -1)} style={{ border: `1px solid ${T.BORDER}`, borderRadius: 7, background: T.SURFACE, color: T.INK, width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                          <Minus size={13} />
                        </button>
                        <span style={{ fontWeight: 700, fontSize: 14.5, minWidth: 16, textAlign: 'center', color: T.INK }}>{qty}</span>
                        <button onClick={() => changeQty(m.id, 1)} style={{ border: 'none', borderRadius: 7, background: T.ACCENT, color: '#fff', width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                          <Plus size={13} />
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {cartItems.length > 0 && (
              <div style={{ background: T.BG, borderRadius: 10, padding: '12px 14px', marginBottom: 14, border: `1px solid ${T.BORDER}` }}>
                {cartItems.map(it => (
                  <div key={it.id} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13.5, color: T.INK, padding: '3px 0' }}>
                    <span>{it.qty}× {it.name}</span>
                    <span style={{ fontWeight: 600 }}>${(it.price * it.qty).toFixed(2)}</span>
                  </div>
                ))}
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14.5, fontWeight: 700, color: T.INK, marginTop: 6, paddingTop: 6, borderTop: `1px solid ${T.BORDER}` }}>
                  <span>Total</span><span>${cartTotal.toFixed(2)}</span>
                </div>
              </div>
            )}

            <div onClick={() => setPaidUpfront(p => !p)} style={{
              width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '13px 14px', borderRadius: 10, marginBottom: 16, cursor: 'pointer',
              border: `1px solid ${paidUpfront ? T.paidPill.color : T.BORDER}`, background: paidUpfront ? T.paidPill.bg : T.SURFACE,
              transition: 'background 0.2s ease, border-color 0.2s ease'
            }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: T.INK }}>Customer Already Paid?</div>
              </div>
              <div style={{
                width: 46, height: 27, borderRadius: 999, flexShrink: 0, position: 'relative',
                background: paidUpfront ? T.paidPill.color : T.BORDER, transition: 'background 0.2s ease'
              }}>
                <div style={{
                  position: 'absolute', top: 3, left: paidUpfront ? 22 : 3, width: 21, height: 21, borderRadius: '50%',
                  background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,0.3)', transition: 'left 0.2s ease'
                }} />
              </div>
            </div>

            {error && <div style={{ color: '#EF4444', fontSize: 13, marginBottom: 10 }}>{error}</div>}

            <button onClick={addOrder} style={{ width: '100%', padding: '13px', borderRadius: 10, background: T.ACCENT, color: '#fff', border: 'none', fontWeight: 700, fontSize: 14.5, cursor: 'pointer' }}>
              Add Order · ${cartTotal.toFixed(2)}
            </button>
            <button onClick={() => { setShowForm(false); resetForm(); }} style={{ width: '100%', marginTop: 8, padding: '10px', borderRadius: 10, background: 'none', color: T.SUB, border: 'none', fontWeight: 600, fontSize: 13.5, cursor: 'pointer' }}>
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<OrderTracker />);
</script>
</body>
</html>
